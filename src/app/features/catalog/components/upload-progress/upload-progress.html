<div class="upload-zone"
     (dragover)="$event.preventDefault()" 
     (drop)="onDrop($event)">
  
  <mat-icon class="upload-icon">cloud_upload</mat-icon>
  <p>Drag & drop gambar atau 
    <label class="upload-link">
      pilih file
      <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden>
    </label>
  </p>

  <div *ngIf="uploadState" class="upload-status">
    <mat-progress-bar 
      [mode]="uploadState.type === 'progress' ? 'determinate' : 'indeterminate'" 
      [value]="uploadState.percent || 0">
    </mat-progress-bar>
    
    <span class="upload-status-text">
      <ng-container *ngIf="uploadState.type === 'progress'">
        Mengunggah... {{ uploadState.percent }}%
      </ng-container>
      <ng-container *ngIf="uploadState.type === 'complete'">
        Upload selesai!
      </ng-container>
      <ng-container *ngIf="uploadState.type === 'error'">
        Error: {{ uploadState.error }}
      </ng-container>
    </span>
  </div>
</div>
