<div style="padding: 20px; max-width: 800px; margin: 0 auto;">
  <mat-card>
    <mat-card-header style="margin-bottom: 20px;">
      <mat-card-title>{{ isEditMode ? 'Edit Produk' : 'Tambah Produk Baru' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; gap: 15px;">
        
        <mat-form-field appearance="outline">
          <mat-label>Judul Produk</mat-label>
          <input matInput formControlName="title" placeholder="Masukkan judul">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Kategori</mat-label>
          <input matInput formControlName="category" placeholder="Contoh: smartphones">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Brand</mat-label>
          <input matInput formControlName="brand" placeholder="Masukkan brand">
        </mat-form-field>

        <div style="display: flex; gap: 15px;">
          <mat-form-field appearance="outline" style="flex: 1;">
            <mat-label>Harga ($)</mat-label>
            <input matInput type="number" formControlName="price">
          </mat-form-field>

          <mat-form-field appearance="outline" style="flex: 1;">
            <mat-label>Stok</mat-label>
            <input matInput type="number" formControlName="stock">
          </mat-form-field>

          <mat-form-field appearance="outline" style="flex: 1;">
            <mat-label>Diskon (%)</mat-label>
            <input matInput type="number" formControlName="discountPercentage">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>URL Thumbnail</mat-label>
          <input matInput formControlName="thumbnail" placeholder="https://...">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Deskripsi</mat-label>
          <textarea matInput formControlName="description" rows="4"></textarea>
        </mat-form-field>

        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
          <button mat-button type="button" (click)="cancel()">Batal</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="isSaving">
            {{ isSaving ? 'Menyimpan...' : 'Simpan' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
