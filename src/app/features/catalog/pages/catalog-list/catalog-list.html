<div class="catalog-container" style="padding: 20px; max-width: 1200px; margin: 0 auto;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Katalog Produk</h2>
  </div>

  <!-- Filter Section -->
  <mat-card style="margin-bottom: 20px; padding: 15px;">
    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
      <mat-form-field appearance="outline" style="flex: 2; min-width: 250px;">
        <mat-label>Cari produk...</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [formControl]="searchControl">
      </mat-form-field>

      <mat-form-field appearance="outline" style="flex: 1; min-width: 200px;">
        <mat-label>Kategori</mat-label>
        <mat-select [formControl]="categoryControl">
          <mat-option value="">Semua Kategori</mat-option>
          <!-- Struktur data dari API dummyjson terbaru butuh slug -->
          <mat-option *ngFor="let cat of (categories$ | async)" [value]="cat.slug || cat">
            {{ cat.name || cat }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card>

  <!-- Loading State -->
  <div *ngIf="isLoading$ | async" style="display: flex; justify-content: center; padding: 50px;">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Product Grid -->
  <div *ngIf="(isLoading$ | async) === false" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
    <mat-card *ngFor="let product of (products$ | async)" class="product-card" style="display: flex; flex-direction: column;">
      <img mat-card-image [src]="product.thumbnail" [alt]="product.title" style="height: 200px; object-fit: contain; padding: 10px; background: #f5f5f5;">
      <mat-card-content style="flex-grow: 1; margin-top: 15px;">
        <h3 style="margin: 0 0 10px 0; font-size: 1.1em;">{{ product.title }}</h3>
        <mat-chip style="margin-bottom: 10px;">{{ product.category }}</mat-chip>
        <p style="color: gray; font-size: 0.9em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
          {{ product.description }}
        </p>
        <h2 style="color: #e91e63; margin-top: auto;">${{ product.price }}</h2>
      </mat-card-content>
      <mat-card-actions style="display: flex; justify-content: space-between; padding: 16px;">
        <button mat-button color="primary">Detail</button>
        <button mat-raised-button color="primary">
          <mat-icon>shopping_cart</mat-icon> Beli
        </button>

        <button mat-button color="warn" (click)="onDelete(product)">Hapus</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <!-- Tombol -->
  <button mat-raised-button color="accent" style="margin-bottom: 20px;" routerLink="/catalog/create">
  Tambah Produk
  </button>

  <!-- Empty State -->
  <div *ngIf="(isLoading$ | async) === false && totalItems === 0" style="text-align: center; padding: 50px; color: gray;">
    <mat-icon style="font-size: 48px; width: 48px; height: 48px; margin-bottom: 15px;">search_off</mat-icon>
    <h3>Tidak ada produk yang ditemukan</h3>
  </div>

  <!-- Paginator -->
  <mat-paginator 
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[12, 24, 36]"
    (page)="onPageChange($event)"
    style="margin-top: 20px; background: transparent;">
  </mat-paginator>
</div>
