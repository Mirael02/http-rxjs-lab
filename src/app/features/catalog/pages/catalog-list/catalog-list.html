<div class="catalog-container">
  <div class="catalog-header">
    <h2>Katalog Produk</h2>
  </div>

  <mat-card class="filter-card">
    <div class="filter-row">
      <mat-form-field appearance="outline" class="filter-search">
        <mat-label>Cari produk...</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [formControl]="searchControl">
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-category">
        <mat-label>Kategori</mat-label>
        <mat-select [formControl]="categoryControl">
          <mat-option value="">Semua Kategori</mat-option>
          <mat-option *ngFor="let cat of (categories$ | async)" [value]="cat.slug || cat">
            {{ cat.name || cat }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card>

  <div *ngIf="isLoading$ | async" class="loading-state">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="product-grid" *ngIf="(isLoading$ | async) === false">
    <mat-card *ngFor="let product of (products$ | async)" class="product-card">
      <img mat-card-image [src]="product.thumbnail" [alt]="product.title" class="product-card-img">
      <mat-card-content class="product-card-content">
        <h3 class="product-card-title">{{ product.title }}</h3>
        <mat-chip class="product-card-category">{{ product.category }}</mat-chip>
        <p class="product-card-desc">{{ product.description }}</p>
        <h2 class="product-card-price">${{ product.price }}</h2>
      </mat-card-content>
      <mat-card-actions class="product-card-actions">
        <button mat-button color="primary" [routerLink]="['/catalog', product.id]">Detail</button>
        <button mat-raised-button color="primary">
          <mat-icon>shopping_cart</mat-icon> Beli
        </button>
        <button mat-button color="warn" (click)="onDelete(product)">Hapus</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <button mat-raised-button color="accent" class="add-product-btn" routerLink="/catalog/create">
    Tambah Produk
  </button>

  <div *ngIf="(isLoading$ | async) === false && totalItems === 0" class="empty-state">
    <mat-icon class="empty-icon">search_off</mat-icon>
    <h3>Tidak ada produk yang ditemukan</h3>
  </div>

  <mat-paginator 
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[12, 24, 36]"
    (page)="onPageChange($event)"
    class="catalog-paginator">
  </mat-paginator>
</div>
