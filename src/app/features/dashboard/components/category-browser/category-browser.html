<mat-card style="padding: 20px; height: 100%; box-sizing: border-box;">
  <h3 style="margin-top: 0;">Jelajahi Kategori</h3>
  
  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>Pilih Kategori</mat-label>
    <mat-select [formControl]="categoryControl">
      <mat-option value="">- Pilih kategori -</mat-option>
      <mat-option *ngFor="let cat of categories$ | async" [value]="cat">
        {{ cat }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-progress-bar *ngIf="isLoadingProducts" mode="indeterminate"></mat-progress-bar>

  <div *ngIf="products.length > 0" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
    <div *ngFor="let p of products" style="display: flex; gap: 15px; align-items: center; padding: 10px; border: 1px solid #eee; border-radius: 8px; cursor: pointer;" [routerLink]="['/catalog', p.id]">
      <img [src]="p.thumbnail" style="width: 60px; height: 60px; object-fit: contain; background: #f5f5f5; border-radius: 4px;">
      <div style="flex: 1;">
        <h4 style="margin: 0 0 5px 0;">{{ p.title }}</h4>
        <p style="margin: 0; color: #e91e63; font-weight: bold;">${{ p.price }}</p>
      </div>
      <mat-chip [style.background]="p.stock < 5 ? '#f44336' : '#e0e0e0'" [style.color]="p.stock < 5 ? 'white' : 'black'">
        Stok: {{ p.stock }}
      </mat-chip>
    </div>
  </div>

  <p *ngIf="!isLoadingProducts && selectedCategory && products.length === 0" style="color: gray; text-align: center; padding: 20px;">
    Tidak ada produk di kategori ini.
  </p>
</mat-card>
