<mat-card class="category-browser-card">
  <h3 class="category-browser-title">Jelajahi Kategori</h3>
  
  <mat-form-field appearance="outline" class="category-select">
    <mat-label>Pilih Kategori</mat-label>
    <mat-select [formControl]="categoryControl">
      <mat-option value="">- Pilih kategori -</mat-option>
      <mat-option *ngFor="let cat of categories$ | async" [value]="cat">
        {{ cat }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-progress-bar *ngIf="isLoadingProducts" mode="indeterminate"></mat-progress-bar>

  <div *ngIf="products.length > 0" class="category-products">
    <div *ngFor="let p of products" class="category-product-item" [routerLink]="['/catalog', p.id]">
      <img [src]="p.thumbnail" class="category-product-img">
      <div class="category-product-info">
        <h4 class="category-product-title">{{ p.title }}</h4>
        <p class="category-product-price">${{ p.price }}</p>
      </div>
      <mat-chip class="category-product-stock" [class.stock-critical]="p.stock < 5">
        Stok: {{ p.stock }}
      </mat-chip>
    </div>
  </div>

  <p *ngIf="!isLoadingProducts && selectedCategory && products.length === 0" class="category-empty">
    Tidak ada produk di kategori ini.
  </p>
</mat-card>
