<div class="dashboard-container">
  <h1 class="dashboard-title">Dashboard</h1>

  <div *ngIf="isLoading" class="loading-state">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Memuat data widget...</p>
  </div>

  <mat-card *ngIf="error" class="error-card">
    <mat-card-content>
      <mat-icon color="warn">error_outline</mat-icon>
      <span>{{ error }}</span>
      <button mat-button color="warn" (click)="ngOnInit()">Coba Lagi</button>
    </mat-card-content>
  </mat-card>

  <div *ngIf="stats && !isLoading" class="stats-grid">
    <app-stats-card icon="inventory_2" label="Total Produk" [value]="stats.totalProducts" color="primary"></app-stats-card>
    <app-stats-card icon="people" label="Total Users" [value]="stats.totalUsers" color="accent"></app-stats-card>
    <app-stats-card icon="shopping_cart" label="Total Cart" [value]="stats.totalCarts" color="warn"></app-stats-card>
    <app-stats-card icon="category" label="Kategori" [value]="stats.categoryCount" color="primary"></app-stats-card>
  </div>

  <div *ngIf="stats && !isLoading" class="dashboard-panels">
    <div class="panel-main">
      <app-category-browser></app-category-browser>
    </div>
    <div class="panel-side">
      <app-stock-monitor></app-stock-monitor>
    </div>
  </div>
</div>
